ollama:
  base_url: "http://localhost:11434/v1"
  api_key: "ollama"
  timeout: 120
  max_tokens: 2048

models:
  # Locally available on this machine (CPU only, 8 cores, 30GB RAM)
  - llama3.1:8b
  - qwen2.5:7b
  - qwen2.5-coder:7b
  - gemma4:e4b

# Judge configuration for philosophical benchmark
# Provider: "ollama" (local) or "openai" (cloud, OpenAI-compatible API)
# When using "openai", the server may be slower on the first call (cold start) but subsequent calls are fast.
# The model must support JSON-formatted responses.
judge:
  # Cloud judge options:
  #
  #   A) OpenCode Zen (free, no auth needed):
  #        provider: "opencode"
  #        model: "opencode/deepseek-v4-flash-free"
  #
  #   B) Generic OpenAI-compatible API (e.g. DeepSeek):
  #        provider: "openai"
  #        model: "deepseek-chat"
  #        base_url: "https://api.deepseek.com/v1"
  #        api_key: "${DEEPSEEK_API_KEY}"
  #
  provider: "opencode"
  model: "opencode/deepseek-v4-flash-free"

# Fallback judge model used only when judge.provider == "ollama":
judge_model: "llama3.1:8b"

benchmarks:
  reasoning:
    enabled: true
    dataset: "cais/mmlu"
    subjects:
      - "abstract_algebra"
      - "logical_fallacies"
      - "formal_logic"
      - "high_school_mathematics"
      - "philosophy"
    n_samples: 5

  math:
    enabled: true
    dataset: "openai/gsm8k"
    split: "test"
    n_samples: 10

  coding:
    enabled: true
    datasets:
      - "openai/openai_humaneval"
      - "google-research-datasets/mbpp"
    n_samples: 5
    execution_timeout: 10

  sql:
    enabled: true
    dataset: "xlangai/spider"
    n_samples: 5

  philosophical:
    enabled: true
    n_samples: 5
    judge_rubric:
      - "Depth of reasoning (1-5)"
      - "Coherence and logical consistency (1-5)"
      - "Acknowledgment of multiple perspectives (1-5)"
      - "Originality of insight (1-5)"
      - "Clarity of expression (1-5)"

  speed:
    enabled: false   # run separately: python run_benchmark.py --benchmarks speed
    n_runs: 3        # median over this many runs per probe to reduce noise

output:
  dir: "results"
  save_raw: true
