ollama:
  base_url: "http://localhost:11434/v1"
  api_key: "ollama"
  timeout: 120
  max_tokens: 2048

models:
  # Large frontier models
  - qwen3:32b
  - qwen3-32b-nothink:latest
  - gemma4:31b-mlx
  - gemma4:26b-mlx
  - nemotron-3-nano:30b
  - nemotron-cascade-2:latest
  # Mid-size general models
  - gemma4-12b-agentic-mtp:latest
  - gemma4-12b-agentic:latest
  - codestral:22b
  # Coding specialists
  - devstral-small-2:latest
  - qwen3-coder:latest
  - qwen2.5-coder:32b
  - qwen2.5-coder:7b
  # Small / fast baselines
  - llama3.1:8b
  - llama3.2:3b

judge_model: "qwen3:32b"

benchmarks:
  reasoning:
    enabled: true
    dataset: "cais/mmlu"
    subjects:
      - "abstract_algebra"
      - "logical_fallacies"
      - "formal_logic"
      - "high_school_mathematics"
      - "philosophy"
    n_samples: 20

  math:
    enabled: true
    dataset: "openai/gsm8k"
    split: "test"
    n_samples: 50

  coding:
    enabled: true
    datasets:
      - "openai/openai_humaneval"
      - "google-research-datasets/mbpp"
    n_samples: 30
    execution_timeout: 10

  sql:
    enabled: true
    dataset: "xlangai/spider"
    n_samples: 30

  philosophical:
    enabled: true
    n_samples: 10
    judge_rubric:
      - "Depth of reasoning (1-5)"
      - "Coherence and logical consistency (1-5)"
      - "Acknowledgment of multiple perspectives (1-5)"
      - "Originality of insight (1-5)"
      - "Clarity of expression (1-5)"

output:
  dir: "results"
  save_raw: true
