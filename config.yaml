ollama:
  base_url: "http://localhost:11434/v1"
  api_key: "ollama"
  timeout: 120
  max_tokens: 2048

models:
  # Small / fast baselines — run first for early results
  - llama3.2:3b          #  2.0 GB
  - qwen2.5-coder:7b     #  4.7 GB
  - llama3.1:8b          #  4.9 GB
  # Mid-size
  - codestral:22b        # 12.6 GB
  - gemma4-12b-agentic:latest      # 12.7 GB
  - gemma4-12b-agentic-mtp:latest  # 13.1 GB
  - devstral-small-2:latest        # 15.2 GB
  - gemma4:26b-mlx       # 16.7 GB
  - qwen3-coder:latest   # 18.6 GB
  # Large — overnight
  - qwen2.5-coder:32b    # 19.9 GB
  - qwen3:32b            # 20.2 GB
  - qwen3-32b-nothink:latest  # 20.2 GB
  - gemma4:31b-mlx       # 20.2 GB
  - nemotron-3-nano:30b  # 24.3 GB
  - nemotron-cascade-2:latest  # 24.3 GB

judge_model: "qwen3:32b"

benchmarks:
  reasoning:
    enabled: true
    dataset: "cais/mmlu"
    subjects:
      - "abstract_algebra"
      - "logical_fallacies"
      - "formal_logic"
      - "high_school_mathematics"
      - "philosophy"
    n_samples: 20

  math:
    enabled: true
    dataset: "openai/gsm8k"
    split: "test"
    n_samples: 50

  coding:
    enabled: true
    datasets:
      - "openai/openai_humaneval"
      - "google-research-datasets/mbpp"
    n_samples: 30
    execution_timeout: 10

  sql:
    enabled: true
    dataset: "xlangai/spider"
    n_samples: 30

  philosophical:
    enabled: true
    n_samples: 10
    judge_rubric:
      - "Depth of reasoning (1-5)"
      - "Coherence and logical consistency (1-5)"
      - "Acknowledgment of multiple perspectives (1-5)"
      - "Originality of insight (1-5)"
      - "Clarity of expression (1-5)"

  speed:
    enabled: false   # run separately: python run_benchmark.py --benchmarks speed
    n_runs: 3        # median over this many runs per probe to reduce noise

output:
  dir: "results"
  save_raw: true
