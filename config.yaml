ollama:
  base_url: "http://localhost:11434/v1"
  api_key: "ollama"
  timeout: 120
  max_tokens: 2048

models:
  # Locally available on this machine (CPU only, 8 cores, 30GB RAM)
  - llama3.1:8b
  - qwen2.5:7b
  - qwen2.5-coder:7b
  - gemma4:e4b
  - qwen3:8b
  - deepseek-r1:7b
  - llama3.2:3b
  - qwen2.5:1.5b

# Judge configuration for philosophical benchmark.
# Model must support JSON-formatted responses.
#
#   provider: "opencode"   — cloud via opencode CLI (free, no API key)
#   provider: "openai"     — generic OpenAI-compatible API
#   provider: "ollama"     — single local Ollama model
#   provider: "ensemble"   — multiple local Ollama models, scores averaged
#
judge:
  provider: "opencode"
  cloud_model: "opencode/deepseek-v4-flash-free"
  ollama_single_model: "llama3.1:8b"
  ensemble_models:
    - qwen3:8b
    - deepseek-r1:7b
    - llama3.1:8b

benchmarks:
  reasoning:
    enabled: true
    dataset: "cais/mmlu"
    subjects:
      - "abstract_algebra"
      - "logical_fallacies"
      - "formal_logic"
      - "high_school_mathematics"
      - "philosophy"
    n_samples: 5

  math:
    enabled: true
    dataset: "openai/gsm8k"
    split: "test"
    n_samples: 10

  coding:
    enabled: true
    datasets:
      - "openai/openai_humaneval"
      - "google-research-datasets/mbpp"
    n_samples: 5
    execution_timeout: 10

  sql:
    enabled: true
    dataset: "xlangai/spider"
    n_samples: 5

  philosophical:
    enabled: true
    n_samples: 5
    judge_rubric:
      - "Depth of reasoning (1-5)"
      - "Coherence and logical consistency (1-5)"
      - "Acknowledgment of multiple perspectives (1-5)"
      - "Originality of insight (1-5)"
      - "Clarity of expression (1-5)"

  speed:
    enabled: false   # run separately: python run_benchmark.py --benchmarks speed
    n_runs: 3        # median over this many runs per probe to reduce noise

output:
  dir: "results"
  save_raw: true
