ollama:
  base_url: "http://localhost:11434/v1"
  api_key: "ollama"
  timeout: 120
  max_tokens: 2048

models:
  - llama3.1:8b
  - qwen2.5:7b
  - qwen2.5-coder:7b

# Judge configuration for philosophical benchmark.
# Set provider to choose the judge backend — all config keys live at the
# same level; only the ones relevant to the selected provider are used.
#
#   provider: "opencode"   — cloud via opencode CLI (free, no API key)
#   provider: "openai"     — generic OpenAI-compatible API
#   provider: "ollama"     — single local Ollama model
#   provider: "ensemble"   — multiple local models, scores averaged
#
judge:
  provider: "ollama"

  # Used when provider is "opencode" or "openai":
  # cloud_model: "opencode/deepseek-v4-flash-free"

  # Used when provider is "ollama":
  ollama_single_model: "llama3.1:8b"

  # Used when provider is "ensemble":
  # ensemble_models:
  #   - qwen3:8b
  #   - deepseek-r1:7b
  #   - llama3.1:8b

  # Used when provider is "openai":
  # base_url: "https://api.deepseek.com/v1"
  # api_key: "${DEEPSEEK_API_KEY}"

benchmarks:
  reasoning:
    enabled: true
    dataset: "cais/mmlu"
    subjects:
      - "abstract_algebra"
      - "logical_fallacies"
      - "formal_logic"
      - "high_school_mathematics"
      - "philosophy"
    n_samples: 20

  math:
    enabled: true
    dataset: "openai/gsm8k"
    split: "test"
    n_samples: 50

  coding:
    enabled: true
    datasets:
      - "openai/openai_humaneval"
      - "google-research-datasets/mbpp"
    n_samples: 30
    execution_timeout: 10

  sql:
    enabled: true
    dataset: "xlangai/spider"
    n_samples: 30

  philosophical:
    enabled: true
    n_samples: 10
    judge_rubric:
      - "Depth of reasoning (1-5)"
      - "Coherence and logical consistency (1-5)"
      - "Acknowledgment of multiple perspectives (1-5)"
      - "Originality of insight (1-5)"
      - "Clarity of expression (1-5)"

  speed:
    enabled: false
    n_runs: 3

output:
  dir: "results"
  save_raw: true

execution:
  parallel_models: false
  max_workers: 2
  memory_guard:
    enabled: true
    calibration_samples: 3
    spike_threshold: 5.0
    max_baseline_seconds: 30
